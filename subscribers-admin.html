<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Subscriber Dashboard · Happier Dentist</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#04060d;--surface:#0d1018;--raised:#111826;
  --border:rgba(255,255,255,0.07);--border-bright:rgba(255,255,255,0.13);
  --gold:#c8a46a;--text:#d8e8f8;--text-mid:#6a8aaa;--text-dim:#2a4060;
  --blue:#4a90c0;--green:#3aa898;
  --font-mono:'Space Mono',monospace;
  --font-body:'DM Sans',system-ui,sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');
html{-webkit-font-smoothing:antialiased}
body{background:var(--void);color:var(--text);font-family:var(--font-body);min-height:100vh;padding:2.5rem 2rem}

header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem}
.header-left h1{font-family:var(--font-mono);font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem}
.header-left p{font-size:13px;color:var(--text-dim);font-family:var(--font-mono);letter-spacing:0.1em}
.btn{font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border-bright);color:var(--text-mid);background:none;cursor:pointer;transition:all 0.2s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{border-color:rgba(200,164,106,0.4);color:var(--gold)}
.btn-gold:hover{background:rgba(200,164,106,0.1)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin-bottom:2rem}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--surface);padding:1.25rem 1.5rem}
.stat-label{font-family:var(--font-mono);font-size:8px;letter-spacing:0.28em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.5rem}
.stat-val{font-family:var(--font-mono);font-size:1.6rem;font-weight:700;color:var(--text)}
.stat-val.gold{color:var(--gold)}
.stat-val.blue{color:var(--blue)}
.stat-val.green{color:var(--green)}

/* FILTERS */
.filters{display:flex;gap:0.5rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.filter-btn{font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--border);color:var(--text-dim);background:none;cursor:pointer;transition:all 0.2s}
.filter-btn:hover,.filter-btn.active{border-color:rgba(200,164,106,0.4);color:var(--gold)}
.filter-sep{color:var(--text-dim);font-size:12px;padding:0 4px}
.search-input{font-family:var(--font-mono);font-size:11px;padding:6px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text);outline:none;width:200px;letter-spacing:0.05em}
.search-input::placeholder{color:var(--text-dim)}
.search-input:focus{border-color:rgba(200,164,106,0.3)}

/* TABLE */
.table-wrap{overflow-x:auto;margin-bottom:2rem}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:1px solid var(--border-bright)}
th{font-family:var(--font-mono);font-size:8px;letter-spacing:0.28em;text-transform:uppercase;color:var(--text-dim);padding:0.6rem 1rem;text-align:left;font-weight:400;white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s}
tbody tr:hover{background:rgba(255,255,255,0.02)}
td{padding:0.85rem 1rem;color:var(--text-mid);font-size:13px;font-weight:300}
td.email{color:var(--text);font-weight:400}
td.reason{color:rgba(216,232,248,0.55);font-style:italic;font-size:12px}
.list-badge{display:inline-block;font-family:var(--font-mono);font-size:8px;letter-spacing:0.14em;text-transform:uppercase;padding:3px 8px;border:1px solid}
.badge-io{border-color:rgba(200,164,106,0.35);color:var(--gold)}
.badge-eo{border-color:rgba(74,144,192,0.35);color:var(--blue)}
.ts{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:0.05em}

.empty{text-align:center;padding:4rem 2rem}
.empty-title{font-family:var(--font-mono);font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.75rem}
.empty-body{font-size:13px;color:var(--text-dim);line-height:1.65}

/* EXPORT */
.export-bar{display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap}
.export-note{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:0.1em}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Subscriber Dashboard</h1>
    <p id="last-updated">Loading…</p>
  </div>
  <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
    <button class="btn btn-gold" onclick="exportCSV()">Export CSV</button>
    <button class="btn" onclick="clearAll()">Clear all</button>
    <button class="btn" onclick="loadData()">Refresh</button>
  </div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-label">Total subscribers</div><div class="stat-val gold" id="stat-total">—</div></div>
  <div class="stat"><div class="stat-label">Inner Operatory</div><div class="stat-val" id="stat-io">—</div></div>
  <div class="stat"><div class="stat-label">EndoOS Insights</div><div class="stat-val blue" id="stat-eo">—</div></div>
  <div class="stat"><div class="stat-label">This week</div><div class="stat-val green" id="stat-week">—</div></div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('inner-operatory',this)">Inner Operatory</button>
  <button class="filter-btn" onclick="setFilter('endoos-insights',this)">EndoOS Insights</button>
  <span class="filter-sep">·</span>
  <input class="search-input" id="search" placeholder="Search email…" oninput="renderTable()"/>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Email</th>
        <th>List</th>
        <th>What brought them</th>
        <th>Source</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<div class="export-bar">
  <button class="btn btn-gold" onclick="exportCSV()">Download CSV</button>
  <span class="export-note" id="export-note"></span>
</div>

<script>
let allSubs = [];
let activeFilter = 'all';

async function loadData() {
  try {
    const result = await window.storage.get('hd_subscribers');
    allSubs = result ? JSON.parse(result.value) : [];
  } catch(e) {
    allSubs = [];
  }
  updateStats();
  renderTable();
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

function updateStats() {
  const io = allSubs.filter(s => s.list === 'inner-operatory');
  const eo = allSubs.filter(s => s.list === 'endoos-insights');
  const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
  const thisWeek = allSubs.filter(s => new Date(s.timestamp) > weekAgo);
  document.getElementById('stat-total').textContent = allSubs.length;
  document.getElementById('stat-io').textContent = io.length;
  document.getElementById('stat-eo').textContent = eo.length;
  document.getElementById('stat-week').textContent = thisWeek.length;
}

function setFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  let filtered = allSubs.filter(s => {
    const matchFilter = activeFilter === 'all' || s.list === activeFilter;
    const matchSearch = !search || s.email.toLowerCase().includes(search) || (s.reason||'').toLowerCase().includes(search);
    return matchFilter && matchSearch;
  }).slice().reverse(); // newest first

  const tbody = document.getElementById('table-body');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-title">No subscribers yet</div><div class="empty-body">Signups from happierdentist.com will appear here automatically.</div></div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map((s, i) => {
    const date = new Date(s.timestamp);
    const dateStr = date.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    const timeStr = date.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
    const badge = s.list === 'inner-operatory'
      ? `<span class="list-badge badge-io">Inner Operatory</span>`
      : `<span class="list-badge badge-eo">EndoOS</span>`;
    const source = s.source === 'direct' || !s.source ? 'Direct' : s.source.replace(/https?:\/\/(www\.)?/, '').split('/')[0];
    return `<tr>
      <td class="ts">${filtered.length - i}</td>
      <td class="email">${s.email}</td>
      <td>${badge}</td>
      <td class="reason">${s.reason || '—'}</td>
      <td class="ts">${source}</td>
      <td class="ts">${dateStr}<br>${timeStr}</td>
    </tr>`;
  }).join('');

  document.getElementById('export-note').textContent = `${filtered.length} record${filtered.length !== 1 ? 's' : ''}`;
}

function exportCSV() {
  if (!allSubs.length) { alert('No subscribers to export yet.'); return; }
  const headers = ['Email', 'List', 'What brought them', 'Source', 'Timestamp'];
  const rows = allSubs.slice().reverse().map(s => [
    s.email,
    s.list === 'inner-operatory' ? 'The Inner Operatory' : 'EndoOS Insights',
    s.reason || '',
    s.source || 'direct',
    s.timestamp
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `subscribers-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

async function clearAll() {
  if (!confirm('Delete all subscriber records? This cannot be undone.')) return;
  await window.storage.set('hd_subscribers', JSON.stringify([]));
  allSubs = [];
  updateStats();
  renderTable();
}

loadData();
setInterval(loadData, 30000); // auto-refresh every 30s
</script>
</body>
</html>
